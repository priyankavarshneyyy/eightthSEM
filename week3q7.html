<!DOCTYPE html>
<html>
<head>
    <title>Train Schedule Table</title>
</head>

<body>

    <h2>Train Schedule</h2>

    <table border="1" cellpadding="8" cellspacing="0">
        <tr>
            <th rowspan="2">Name of the Train</th>
            <th rowspan="2">Place</th>
            <th rowspan="2">Destination</th>
            <th rowspan="2">Train No.</th>
            <th colspan="2">Time</th>
            <th rowspan="2">Fare</th>
        </tr>
        <tr>
            <th>Arrival</th>
            <th>Departure</th>
        </tr>

        <tr>
            <td>Express Line</td>
            <td>Delhi</td>
            <td>Mumbai</td>
            <td>12345</td>
            <td>08:30 AM</td>
            <td>09:00 AM</td>
            <td>₹1500</td>
        </tr>

        <tr>
            <td>Super Fast</td>
            <td>Chennai</td>
            <td>Bangalore</td>
            <td>23456</td>
            <td>10:15 AM</td>
            <td>10:45 AM</td>
            <td>₹800</td>
        </tr>

        <tr>
            <td>Night Rider</td>
            <td>Kolkata</td>
            <td>Patna</td>
            <td>34567</td>
            <td>07:00 PM</td>
            <td>07:30 PM</td>
            <td>₹600</td>
        </tr>

    </table>

</body>
</html>
