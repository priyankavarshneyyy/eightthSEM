<!DOCTYPE html>
<html>
<head>
    <title>Date Example</title>
</head>
<body>

<script>
    var num = prompt("Enter a number between 1 and 31:");

    var d = new Date();      // get current date
    d.setDate(num);          // set the date entered by user

    var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

    var dayName = days[d.getDay()];

    document.write("That date falls on: " + dayName);
</script>

</body>
</html>
